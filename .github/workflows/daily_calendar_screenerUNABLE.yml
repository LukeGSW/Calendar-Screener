name: Daily Calendar Screener

# Gira nei giorni feriali alle 06:00 UTC (~07:00-08:00 CET), notte EU / mercato USA chiuso:
# l'EOD della sessione USA precedente è già disponibile su EODHD e la shortlist è pronta
# per la tua mattina, prima dell'apertura USA. Avvio manuale anche con "Run workflow".
on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python -m src.pipeline

      - name: Commit results
        run: |
          git config user.name  "kriterion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/screener_results.csv data/run_metadata.json data/history.csv
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai risultati."
          else
            git commit -m "screener: aggiornamento $(date -u +'%Y-%m-%d')"
            git push
          fi
